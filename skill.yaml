name: skill-office-docs
version: 0.1.0
mode: local_plugin
entrypoint: src.skill_office_docs.main:Skill
core_api: ">=1.0,<2.0"
capabilities:
  - id: office_docs.meeting_notes_summary
    description: Summarize meeting transcript content into actions, decisions, and risks.
    input_schema:
      type: object
      properties:
        transcript:
          type: string
        title:
          type: ["string", "null"]
      additionalProperties: false
    output_schema:
      type: object
      properties:
        status: {type: string}
        summary: {type: ["string", "null"]}
        action_items:
          type: array
          items: {type: object}
        decisions:
          type: array
          items: {type: object}
        risks:
          type: array
          items: {type: object}
        detail: {type: ["string", "null"]}
    risk_level: low
    confirmation_required: false
    retry_policy: bounded_backoff
    observability_events:
      - office_docs.meeting_notes_summary
  - id: office_docs.compose_document
    description: Compose an office document draft from a structured brief.
    input_schema:
      type: object
      properties:
        title:
          type: ["string", "null"]
        brief:
          type: string
        document_type:
          type: ["string", "null"]
        audience:
          type: ["string", "null"]
        tone:
          type: ["string", "null"]
      additionalProperties: false
    output_schema:
      type: object
      properties:
        status: {type: string}
        title: {type: ["string", "null"]}
        body: {type: ["string", "null"]}
        document_type: {type: ["string", "null"]}
        detail: {type: ["string", "null"]}
    risk_level: low
    confirmation_required: false
    retry_policy: bounded_backoff
    observability_events:
      - office_docs.compose_document
permissions:
  read_memory: false
  write_memory: false
  internet_access: false
  file_write: false
  external_actions: false
healthcheck:
  kind: python
  target: src.skill_office_docs.main:healthcheck
timeout_ms: 60000
enabled_by_default: true